{{ define "main" }}

<main class="blog-post-layout">

    <aside class="toc-sidebar">
        {{ .TableOfContents }}
    </aside>

    <article class="blog-post">

        <header class="post-header">
            <h1>{{ .Title }}</h1>

            <div class="post-meta">
                {{ .Date.Format "Jan 2, 2006" }}
            </div>
        </header>

        <div class="post-content">
            {{ .Content }}
        </div>

    </article>

</main>

{{ end }}
