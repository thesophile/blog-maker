<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhinav Babu | Web Developer, Python Django, Kerala</title>
    <meta name="description"
        content="Abhinav P Babu is a web developer from Kerala specializing in Python and Django. With a passion for building efficient and scalable applications, Abhinav has experience working with various technologies and contributing to open source projects. Explore his portfolio, projects, and contact information on his personal website.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="navbar.css">
</head>


<!-- Navbar -->
<nav class="sticky top-0 z-50 border-b">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-14">
        <span class="font-minecraft text-sm">APB</span>

        <!-- Desktop links -->
        <div class="hidden md:flex gap-6 text-sm items-center">
            <a href="#skills" class="hover:underline">Skills</a>
            <a href="#featured" class="hover:underline">Projects</a>
            <a href="#videos" class="hover:underline">Videos</a>
            <a href="#contact" class="hover:underline">Contact</a>
            <button id="theme-toggle" aria-label="Toggle dark/light mode">
                <span id="theme-icon">☾</span>
            </button>
        </div>

        <!-- Mobile: hamburger + toggle -->
        <div class="md:hidden flex items-center gap-3">
            <button id="theme-toggle-mobile" aria-label="Toggle dark/light mode"
                style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text);font-size:15px;">
                <span id="theme-icon-mobile">☾</span>
            </button>
            <button id="hamburger" class="flex flex-col gap-1.5 p-1"
                onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <span class="block w-5 h-0.5 ham-line"></span>
                <span class="block w-5 h-0.5 ham-line"></span>
                <span class="block w-5 h-0.5 ham-line"></span>
            </button>
        </div>
    </div>

    <!-- Mobile dropdown -->
    <div id="mobile-menu" class="hidden md:hidden border-t">
        <div class="max-w-6xl mx-auto px-6 py-3 flex flex-col gap-3 text-sm">
            <a href="#skills" onclick="document.getElementById('mobile-menu').classList.add('hidden')"
                class="hover:underline">Skills</a>
            <a href="#featured" onclick="document.getElementById('mobile-menu').classList.add('hidden')"
                class="hover:underline">Projects</a>
            <a href="#videos" onclick="document.getElementById('mobile-menu').classList.add('hidden')"
                class="hover:underline">Videos</a>
            <a href="#contact" onclick="document.getElementById('mobile-menu').classList.add('hidden')"
                class="hover:underline">Contact</a>
        </div>
    </div>
</nav>

<script>
    (function () {
        const saved = localStorage.getItem('theme');
        const osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = saved || (osDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);

        function syncIcons(theme) {
            const icon = document.getElementById('theme-icon');
            const iconM = document.getElementById('theme-icon-mobile');
            const symbol = theme === 'dark' ? '☀' : '☾';
            if (icon) icon.textContent = symbol;
            if (iconM) iconM.textContent = symbol;
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            syncIcons(theme);
        }

        // Wire up toggles after DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            syncIcons(theme);

            function toggle() {
                const current = document.documentElement.getAttribute('data-theme');
                applyTheme(current === 'dark' ? 'light' : 'dark');
            }

            document.getElementById('theme-toggle').addEventListener('click', toggle);
            document.getElementById('theme-toggle-mobile').addEventListener('click', toggle);
        });

        // Follow OS changes only if user hasn't set a manual preference
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
            if (!localStorage.getItem('theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });
    })();
</script>
